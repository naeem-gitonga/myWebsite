include:
  - '/.gitlab-shared.yml'
  - '/backend/apis/.gitlab-ci.yml'
  - '/backend/cdk/.gitlab-ci.yml'

image: node:24.12.0

stages:
  - test
  - build
  - test-cdk
  - release
  - deploy
  - notify

.front_end_changes: &front_end_changes
  - app/**/*
  - components/**/*
  - hooks/**/*
  - pages/**/*
  - types/**/*
  - utils/**/*
  - next.config.js
  - package.json
  - vercel.json
  - .gitlab-ci.yml
  - .releaserc

.backend_end_changes: &back_end_changes
  - backend/apis/**/*
  - backend/cdk/**/*
  - README.md

test_frontend:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "staging"'
      changes: *front_end_changes
    - when: never
  script:
    - npm ci
    - npm test -- --runInBand

deploy_frontend_staging:
  stage: deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "staging"'
      changes: *front_end_changes
    - when: never
  script:
    - curl -X POST https://api.vercel.com/v1/integrations/deploy/prj_XVrzM2eALvquKAUKMDAlgjSccy4B/cGxMEW1fLT

publish:
  image: node:24.12.0
  stage: release
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes: *front_end_changes
    - when: never
  script:
    - npm install @semantic-release/gitlab @semantic-release/commit-analyzer @semantic-release/release-notes-generator conventional-changelog-conventionalcommits
    - GITLAB_TOKEN=$PROJECT_RELEASE_TOKEN npx semantic-release@25

deploy_frontend_production:
  stage: deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes: *front_end_changes
    - when: never
  script:
    - curl -X POST https://api.vercel.com/v1/integrations/deploy/prj_XVrzM2eALvquKAUKMDAlgjSccy4B/k4eiYJ4iju

notify_subscribers:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  stage: notify
  image: node:24.12.0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_COMMIT_MESSAGE =~ /feat: new article /'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "staging" && $CI_COMMIT_MESSAGE =~ /feat: new article /'
      when: on_success
    - when: never
  needs: []
  script:
    - !reference [.install_aws, script]
    - !reference [.assume_role, script]
    - |
      # Use CI variable overrides (manual runs) or extract from the new article page
      if [ -n "$NOTIFY_SLUG" ] && [ -n "$NOTIFY_TITLE" ] && [ -n "$NOTIFY_DESCRIPTION" ]; then
        ARTICLE_SLUG="$NOTIFY_SLUG"
        ARTICLE_TITLE="$NOTIFY_TITLE"
        DESCRIPTION="$NOTIFY_DESCRIPTION"
        ARTICLE_URL="${SITE_URL}/articles/${ARTICLE_SLUG}"
      else
        PAGE=$(git diff --name-only HEAD~1 HEAD | grep 'app/articles/.*/page.tsx' | head -1)
        if [ -z "$PAGE" ]; then
          echo "No new article page found in this commit. Skipping notify."
          exit 0
        fi
        ARTICLE_SLUG=$(echo "$PAGE" | sed 's|app/articles/||;s|/page.tsx||')
        ARTICLE_URL="${SITE_URL}/articles/${ARTICLE_SLUG}"
        ARTICLE_TITLE=$(node -e "const c=require('fs').readFileSync('$PAGE','utf8');const m=c.match(/const title = [\"'\`](.+?)[\"'\`]/);process.stdout.write(m[1])")
        DESCRIPTION=$(node -e "const c=require('fs').readFileSync('$PAGE','utf8');const m=c.match(/const description\s*=\s*[\r\n\s]*[\"'\`]([^\"'\`]+)[\"'\`]/s);process.stdout.write(m[1])")
      fi

      # On staging, restrict delivery to test email only
      if [ "$CI_COMMIT_BRANCH" = "staging" ] || [ -n "$NOTIFY_TEST_EMAIL" ]; then
        TEST_EMAIL="${NOTIFY_TEST_EMAIL:-jngincorporated@gmail.com}"
        PAYLOAD=$(jq -n \
          --arg title "$ARTICLE_TITLE" \
          --arg url "$ARTICLE_URL" \
          --arg description "$DESCRIPTION" \
          --arg testEmail "$TEST_EMAIL" \
          '{"title":$title,"url":$url,"description":$description,"testEmail":$testEmail}')
      else
        PAYLOAD=$(jq -n \
          --arg title "$ARTICLE_TITLE" \
          --arg url "$ARTICLE_URL" \
          --arg description "$DESCRIPTION" \
          '{"title":$title,"url":$url,"description":$description}')
      fi

      curl --fail --aws-sigv4 "aws:amz:us-east-1:execute-api" \
        --user "${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}" \
        -H "x-amz-security-token: ${AWS_SESSION_TOKEN}" \
        -H "Content-Type: application/json" \
        -X POST \
        -d "$PAYLOAD" \
        "${SUBSCRIBER_NOTIFY_URL}"
